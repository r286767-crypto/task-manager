<!DOCTYPE html>

<html>
<head>
  <title>Task Manager</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}
#msg {
  color: red;
  font-size: 14px;
}

input, button {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}

button {
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

  </style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <!-- ✅ ADD id="email" -->
  <input type="email" id="email" placeholder="Enter email">

  <!-- ✅ ADD id="password" -->
  <input type="password" id="password" placeholder="Enter password">

  <!-- ✅ ADD onclick -->
  <button onclick="login()">Login</button>

   <p id="msg"></p>
</div>

<script>
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("https://task-manager-production-6af6.up.railway.app/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.status === 200) {
      localStorage.setItem("token", data.token);
      document.getElementById("msg").innerText = "Login success ✅";
    } else {
      document.getElementById("msg").innerText = data;
    }
  }
</script>

<script>
  function login() {
    alert("Button clicked ✅");
  }
</script>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("https://task-manager-production-8873.up.railway.app/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
  localStorage.setItem("token", data.token);
  window.location.href = "dashboard.html";

    } else {
      document.getElementById("msg").innerText = data;
    }

  } catch (err) {
    console.log(err);
    alert("Error connecting to server ❌");
  }
}
</script>
</body>

</html>
